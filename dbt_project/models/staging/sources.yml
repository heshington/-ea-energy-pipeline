version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw tables loaded by the Python extract scripts (EA CSVs and Open-Meteo API)"
    tables:
      - name: generation_output
        description: "Half-hourly generation output per station, unpivoted from EA monthly CSVs"
        columns:
          - name: poc_code
            description: "Point of Connection code — unique station identifier"
          - name: gen_code
            description: "Generator/station name"
          - name: fuel_code
            description: "Fuel type: Hydro, Gas, Coal, Geo, Wind, Diesel, Wood"
          - name: tech_code
            description: "Technology type: Hydro, Geo, Thrml (Thermal), Cogen, Wind"
          - name: trading_date
            description: "Calendar date of generation"
          - name: trading_period
            description: "Half-hourly trading period (1–48, occasionally 49–50 on DST days)"
          - name: output_kw
            description: "Generation output in kilowatts for this half-hour period"

      - name: wholesale_prices
        description: "Nodal wholesale electricity prices and volumes per trading period"
        columns:
          - name: trading_date
          - name: trading_period
          - name: node
            description: "Grid node / Point of Connection"
          - name: price
            description: "Final nodal price in NZD/MWh"
          - name: load_mwh
          - name: generation_mwh

      - name: retail_prices
        description: "Regional retail power prices (monthly summary data)"

      - name: weather_daily
        description: >
          Daily weather observations from Open-Meteo's ERA5 historical archive,
          covering the major NZ hydro catchment lakes plus Lake Taupō.
          One row per (location, date).
        columns:
          - name: location
            description: "Lake catchment identifier (e.g. lake_pukaki, lake_manapouri)"
            tests:
              - not_null
          - name: time
            description: "Date of observation in Pacific/Auckland time"
            tests:
              - not_null
          - name: precipitation_sum
            description: "Total daily liquid-equivalent precipitation (mm)"
          - name: rain_sum
            description: "Daily rainfall (mm)"
          - name: snowfall_sum
            description: "Daily snowfall depth (cm)"
          - name: temperature_2m_mean
            description: "Mean daily air temperature at 2m (°C)"
          - name: temperature_2m_max
            description: "Maximum daily air temperature at 2m (°C)"
          - name: temperature_2m_min
            description: "Minimum daily air temperature at 2m (°C)"