version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: ea_postgres
    environment:
      POSTGRES_DB: ea_energy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"       # 5433 on host so it doesn't clash with the weather pipeline
    volumes:
      - ea_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ea_postgres_data:
